# smb sd conf
[global]
    workgroup = WORKGROUP
    netbios name = LUCKFOXPS2
    server string = Luckfox PS2 SMB
    security = user
    map to guest = Bad User
    guest account = nobody

    server min protocol = NT1
    server max protocol = NT1
    client min protocol = NT1
    ntlm auth = yes

    smb ports = 445 139

    load printers = no
    disable spoolss = yes

    log file = /var/log/samba.log
    max log size = 100

[PS2SMB]
    path = /mnt/sdcard
    browseable = yes
    read only = yes
    guest ok = yes
    guest only = yes
    force user = nobody
